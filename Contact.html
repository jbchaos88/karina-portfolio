<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Karina</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='black'/%3E%3Ctext x='50' y='55' font-family='Arial, sans-serif' font-size='70' fill='white' text-anchor='middle' dominant-baseline='middle'%3EK%3C/text%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;1,400&family=Pinyon+Script&family=Viaoda+Libre:wght@400;500;600&family=UnifrakturCook&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;
      font-family: 'DM Sans', sans-serif;
      background: #000000;
      color: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      min-height: 100%;
      background: #000000;
      color: #FFFFFF;
    }

    body {
      line-height: 1.75;
    }

    a {
      color: #FFFFFF;
      text-decoration: none;
    }

    body, button, input, textarea {
      font-family: 'DM Sans', sans-serif;
    }

    main {
      width: min(1160px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    header {
      padding: 24px 24px 0;
    }

    .nav-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      flex-wrap: wrap;
    }

    .brand {
      font-size: 1rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .brand a {
      font-family: 'UnifrakturCook', serif;
      color: #d4af37;
    }

    .nav-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .nav-links a {
      color: #d4af37;
    }

    .nav-links a.active {
      border-bottom: 2px solid #d4af37;
      padding-bottom: 4px;
    }

    .nav-toggle {
      display: none;
      background: transparent;
      border: none;
      color: #FFFFFF;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
    }

    .nav-overlay {
      position: fixed;
      inset: 0;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
      padding: 48px 24px;
      background: rgba(0, 0, 0, 0.98);
      transform: translateY(-100%);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.35s ease, opacity 0.35s ease;
    }

    .nav-overlay.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .close-overlay {
      position: absolute;
      top: 20px;
      right: 20px;
      border: none;
      background: transparent;
      color: #FFFFFF;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
    }

    .overlay-links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      text-align: center;
    }

    .overlay-links a {
      font-size: clamp(1.4rem, 4vw, 2rem);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    .overlay-links a.active {
      border-bottom: none;
      opacity: 0.9;
    }

    .contact-section {
      min-height: calc(100vh - 96px);
      display: grid;
      place-items: center;
      padding: 72px 0 48px;
    }

    .contact-card {
      width: min(660px, 100%);
      padding: 56px 40px;
      background: #000000;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 28px 80px rgba(255,255,255,0.03);
    }

    .contact-title {
      font-family: 'UnifrakturCook', serif;
      font-size: clamp(2.8rem, 6vw, 4.2rem);
      margin-bottom: 0.35rem;
      letter-spacing: 0.02em;
      text-align: center;
    }

    .contact-copy {
      font-family: 'Pinyon Script', cursive;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      margin: 0 auto 2.5rem;
      max-width: 640px;
      text-align: center;
      opacity: 0.9;
    }

    .contact-form {
      display: grid;
      gap: 24px;
    }

    .field-group {
      display: grid;
      gap: 12px;
    }

    label {
      font-size: 0.9rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      opacity: 0.75;
    }

    input,
    textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1px solid #FFFFFF;
      padding: 14px 0 10px;
      color: #FFFFFF;
      font-size: 1rem;
      outline: none;
      resize: vertical;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255,255,255,0.5);
    }

    input:focus,
    textarea:focus {
      color: #FFFFFF;
    }

    textarea {
      min-height: 180px;
    }

    .submit-button {
      margin-top: 4px;
      padding: 16px 24px;
      width: fit-content;
      background: #FFFFFF;
      color: #000000;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      transition: background 0.25s ease, color 0.25s ease;
    }

    .submit-button:hover {
      background: #000000;
      color: #FFFFFF;
      border: 1px solid #FFFFFF;
    }

    .thank-you {
      margin-top: 16px;
      font-size: 0.95rem;
      opacity: 0.9;
      min-height: 1.4em;
    }

    .social-link {
      margin-top: 36px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: #FFFFFF;
      opacity: 0.9;
      font-size: 0.95rem;
    }

    .social-link svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    @media (max-width: 640px) {
      header {
        padding: 18px 18px 0;
      }

      .nav-container {
        flex-direction: row;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
      }

      .nav-links {
        display: none;
      }

      .nav-toggle {
        display: block;
      }

      .contact-card {
        padding: 40px 24px;
      }

      .contact-title {
        font-size: 2.8rem;
      }

      .contact-copy {
        font-size: 2.2rem;
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .contact-card.fade-in {
      animation: fadeInUp 1s ease-out both;
    }
  </style>
</head>
<body>
  <header>
    <div class="nav-container">
      <div class="brand"><a href="Home Page.html">Karina</a></div>
      <nav class="nav-links">
        <a href="Home Page.html">Home</a>
        <a href="Gallery.html">Gallery</a>
        <a href="About.html">About</a>
        <a href="Contact.html" class="active">Contact</a>
      </nav>
      <button id="navToggle" class="nav-toggle" aria-label="Open menu" aria-expanded="false" aria-controls="navOverlay">☰</button>
    </div>
  </header>

  <div id="navOverlay" class="nav-overlay" aria-hidden="true">
    <button class="close-overlay" aria-label="Close menu">×</button>
    <nav class="overlay-links" role="navigation" aria-label="Mobile menu">
      <a href="Home Page.html">Home</a>
      <a href="Gallery.html">Gallery</a>
      <a href="About.html">About</a>
      <a href="Contact.html" class="active">Contact</a>
    </nav>
  </div>

  <main>
    <section class="contact-section" id="contact">
      <div class="contact-card">
        <h1 class="contact-title">Let's create something timeless.</h1>
        <p class="contact-copy">Tell me about your wedding day and I’ll get back to you soon.</p>

        <form class="contact-form" id="contactForm">
          <div class="field-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name">
          </div>

          <div class="field-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
          </div>

          <div class="field-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Tell me about your wedding plans" rows="6"></textarea>
          </div>

          <button type="submit" class="submit-button">Send message</button>
          <div class="thank-you" id="thankYouMessage" aria-live="polite"></div>
        </form>

        <a class="social-link" href="https://www.instagram.com" target="_blank" rel="noreferrer noopener">
          <svg viewBox="0 0 512 512" aria-hidden="true"><path d="M349.33 69.33H162.67C116.25 69.33 80 105.58 80 152v186.67c0 46.42 36.25 82.67 82.67 82.67h186.67c46.42 0 82.67-36.25 82.67-82.67V152c0-46.42-36.25-82.67-82.67-82.67zm53.34 268.67c0 29.44-23.9 53.34-53.34 53.34H162.67c-29.44 0-53.34-23.9-53.34-53.34V152c0-29.44 23.9-53.34 53.34-53.34h186.67c29.44 0 53.34 23.9 53.34 53.34v186.67z"></path><path d="M256 158.4c-54.54 0-98.67 44.13-98.67 98.67S201.46 355.73 256 355.73 354.67 311.6 354.67 257 310.54 158.4 256 158.4zm0 162.13c-34.02 0-61.47-27.45-61.47-61.47s27.45-61.47 61.47-61.47 61.47 27.45 61.47 61.47-27.45 61.47-61.47 61.47z"></path><circle cx="396.67" cy="115.33" r="17.07"></circle></svg>
          @karina.photography
        </a>
      </div>
    </section>
  </main>

  <button id="scrollToTopButton" class="scroll-to-top" type="button" aria-label="Scroll to top">
    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <path d="M6 14l6-6 6 6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <script>
    const form = document.getElementById('contactForm');
    const thankYou = document.getElementById('thankYouMessage');

    form.addEventListener('submit', event => {
      event.preventDefault();
      thankYou.textContent = "Thank you. I'll be in touch soon.";
      form.reset();
    });

    const scrollButton = document.getElementById('scrollToTopButton');

    window.addEventListener('scroll', () => {
      if (window.scrollY > 400) {
        scrollButton.classList.add('visible');
      } else {
        scrollButton.classList.remove('visible');
      }
    });

    scrollButton.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });

    const navToggle = document.getElementById('navToggle');
    const navOverlay = document.getElementById('navOverlay');
    const closeOverlay = document.querySelector('.close-overlay');

    const openNav = () => {
      navOverlay.classList.add('open');
      navToggle.setAttribute('aria-expanded', 'true');
      navOverlay.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    };

    const closeNav = () => {
      navOverlay.classList.remove('open');
      navToggle.setAttribute('aria-expanded', 'false');
      navOverlay.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    };

    navToggle.addEventListener('click', openNav);
    closeOverlay.addEventListener('click', closeNav);
    navOverlay.addEventListener('click', (event) => {
      if (event.target === navOverlay) {
        closeNav();
      }
    });
  </script>
</body>
</html>
