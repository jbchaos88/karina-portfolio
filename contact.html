<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Karina</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ctext x='16' y='23' font-family='serif' font-size='22' fill='%23fff' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Viaoda+Libre&family=Pinyon+Script&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Navigation ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 200;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
    }

    .nav-logo {
      font-family: 'Viaoda Libre', serif;
      font-size: 1.6rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2.5rem;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: opacity 0.25s;
    }

    .nav-links a:not(.active) { opacity: 0.55; }
    .nav-links a:hover { opacity: 1; }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      z-index: 202;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1px;
      background: #fff;
      transition: transform 0.3s, opacity 0.3s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10rem 2rem 5rem;
    }

    /* ── Page Header ── */
    .page-header {
      text-align: center;
      margin-bottom: 4rem;
    }

    .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 1rem;
    }

    .page-header h1 {
      font-family: 'Viaoda Libre', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #C9A84C;
    }

    .page-header .sub {
      font-family: 'Pinyon Script', cursive;
      font-style: italic;
      font-size: clamp(1.3rem, 3vw, 2rem);
      opacity: 0.55;
      margin-top: 0.6rem;
    }

    /* ── Form ── */
    .form-wrap {
      width: 100%;
      max-width: 560px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 3rem;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    input,
    textarea {
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.35);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      font-weight: 300;
      padding: 0.6rem 0 0.8rem;
      width: 100%;
      outline: none;
      transition: border-color 0.25s;
      -webkit-appearance: none;
      border-radius: 0;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255, 255, 255, 0.25);
      font-weight: 300;
    }

    input:focus,
    textarea:focus {
      border-color: #fff;
      color: #fff;
    }

    textarea {
      resize: none;
      height: 120px;
      line-height: 1.7;
    }

    /* Submit */
    .submit-wrap {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0;
      margin-top: -0.5rem;
    }

    .btn-submit {
      background: #fff;
      color: #000;
      border: 1px solid #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.76rem;
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.9rem 2.8rem;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }

    .btn-submit:hover {
      background: #000;
      color: #fff;
    }

    /* ── Thank You ── */
    .thank-you {
      display: none;
      text-align: center;
      animation: fadeIn 0.5s ease forwards;
    }

    .thank-you.visible { display: block; }

    .thank-you p:first-child {
      font-family: 'Pinyon Script', cursive;
      font-style: italic;
      font-size: clamp(2rem, 5vw, 3.2rem);
      opacity: 0.9;
      margin-bottom: 0.8rem;
    }

    .thank-you p:last-child {
      font-size: 0.78rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      opacity: 0.4;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Instagram ── */
    .social {
      margin-top: 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
    }

    .social-label {
      font-size: 0.65rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      opacity: 0.35;
    }

    .instagram-link {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      color: #fff;
      text-decoration: none;
      opacity: 0.5;
      transition: opacity 0.25s;
    }

    .instagram-link:hover { opacity: 1; }

    .instagram-link svg {
      width: 20px;
      height: 20px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .instagram-link span {
      font-size: 0.8rem;
      letter-spacing: 0.12em;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 2.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer p {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      opacity: 0.35;
    }

    .footer-links {
      display: flex;
      gap: 1.8rem;
    }

    .footer-links a {
      color: #fff;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      opacity: 0.35;
      transition: opacity 0.2s;
    }

    .footer-links a:hover { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }

      .nav-links {
        position: fixed;
        inset: 0;
        background: #000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.8rem;
        z-index: 201;
        display: none;
      }

      .nav-links.open { display: flex; }
      .nav-links a { font-size: 1rem; letter-spacing: 0.2em; opacity: 0.8; }

      .hamburger { display: flex; }

      main { padding: 8rem 1.5rem 4rem; }

      footer {
        flex-direction: column;
        text-align: center;
        padding: 2rem 1.5rem;
      }
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-header .eyebrow { animation: fadeUp 0.9s ease-out 0.1s both; }
    .page-header h1       { animation: fadeUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both; }
    .page-header .sub     { animation: fadeUp 0.9s ease-out 0.45s both; }
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── Scroll-to-top ── */
    .scroll-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease, background 0.25s ease, transform 0.25s ease;
      z-index: 500;
    }
    .scroll-top.visible { opacity: 1; visibility: visible; }
    .scroll-top:hover { background: rgba(255,255,255,0.85); transform: translateY(-3px); }
    .scroll-top svg { width: 14px; height: 14px; fill: none; stroke: #000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-logo">Karina</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html"   onclick="closeNav()">Home</a></li>
      <li><a href="gallery.html" onclick="closeNav()">Gallery</a></li>
      <li><a href="about.html"   onclick="closeNav()">About</a></li>
      <li><a href="contact.html" class="active" onclick="closeNav()">Contact</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation" onclick="toggleNav()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <main>
    <!-- Header -->
    <div class="page-header">
      <p class="eyebrow">Get in Touch</p>
      <h1>Contact</h1>
      <p class="sub">Let's tell your story together</p>
    </div>

    <!-- Form -->
    <div class="form-wrap">
      <form id="contactForm" novalidate>
        <div class="field reveal">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="First &amp; last name" autocomplete="name" />
        </div>
        <div class="field reveal" style="transition-delay:0.12s">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email" />
        </div>
        <div class="field reveal" style="transition-delay:0.24s">
          <label for="message">Your Message</label>
          <textarea id="message" name="message" placeholder="Tell me about your wedding — date, venue, and anything else you'd like to share."></textarea>
        </div>
        <div class="submit-wrap reveal" style="transition-delay:0.36s">
          <button type="submit" class="btn-submit">Send Enquiry</button>
        </div>
      </form>

      <!-- Thank You -->
      <div class="thank-you" id="thankYou">
        <p>Thank you.</p>
        <p>I'll be in touch soon.</p>
      </div>
    </div>

    <!-- Instagram -->
    <div class="social reveal" style="transition-delay:0.1s">
      <span class="social-label">Find me on</span>
      <a href="#" class="instagram-link" aria-label="Instagram">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="0.5" fill="#fff" stroke="none"/>
        </svg>
        <span>@karina.photography</span>
      </a>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Karina. All rights reserved.</p>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">Email</a>
      <a href="#">Enquire</a>
    </div>
  </footer>

  <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script>
    /* ── Nav ── */
    const hamburger = document.getElementById('hamburger');
    const navLinks   = document.getElementById('navLinks');

    function toggleNav() {
      const open = navLinks.classList.toggle('open');
      hamburger.classList.toggle('open', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }

    function closeNav() {
      navLinks.classList.remove('open');
      hamburger.classList.remove('open');
      document.body.style.overflow = '';
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) closeNav();
    });

    /* Scroll reveal */
    const revealObs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

    /* ── Form ── */
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      this.style.animation = 'fadeOut 0.35s ease forwards';
      setTimeout(() => {
        this.style.display = 'none';
        const ty = document.getElementById('thankYou');
        ty.classList.add('visible');
      }, 350);
    });
    /* Scroll-to-top */
    const scrollTopBtn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>

  <style>
    @keyframes fadeOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-8px); }
    }
  </style>

</body>
</html>
