<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Karina</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' fill='%23000'/%3E%3Ctext x='16' y='23' font-family='serif' font-size='22' fill='%23fff' text-anchor='middle'%3EK%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Viaoda+Libre&family=Pinyon+Script&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;1,9..40,300&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      overflow-x: hidden;
    }

    /* ── Navigation ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 200;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 3rem;
      background: linear-gradient(to bottom, rgba(0,0,0,0.75) 0%, transparent 100%);
    }

    .nav-logo {
      font-family: 'Viaoda Libre', serif;
      font-size: 1.6rem;
      color: #fff;
      text-decoration: none;
      letter-spacing: 0.04em;
    }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2.5rem;
    }

    .nav-links a {
      color: #fff;
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: opacity 0.25s;
    }

    .nav-links a:hover,
    .nav-links a.active { opacity: 1; }
    .nav-links a:not(.active) { opacity: 0.55; }

    /* Hamburger */
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 6px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      z-index: 202;
    }

    .hamburger span {
      display: block;
      width: 22px;
      height: 1px;
      background: #fff;
      transition: transform 0.3s, opacity 0.3s;
    }

    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* ── Page Header ── */
    .page-header {
      padding: 9rem 2rem 4rem;
      text-align: center;
    }

    .eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      opacity: 0.45;
      margin-bottom: 1rem;
    }

    .page-header h1 {
      font-family: 'Viaoda Libre', serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 400;
      letter-spacing: 0.06em;
      line-height: 1;
      color: #C9A84C;
    }

    .page-header .sub {
      font-family: 'Pinyon Script', cursive;
      font-style: italic;
      font-size: clamp(1.4rem, 3.5vw, 2.4rem);
      opacity: 0.7;
      margin-top: 0.5rem;
    }

    .rule {
      width: 1px;
      height: 48px;
      background: rgba(255,255,255,0.18);
      margin: 2.5rem auto 0;
    }

    /* ── Masonry Grid ── */
    .masonry-section {
      padding: 2.5rem 2rem 6rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .masonry {
      columns: 3;
      column-gap: 0.9rem;
    }

    .masonry-item {
      break-inside: avoid;
      margin-bottom: 0.9rem;
      position: relative;
      overflow: hidden;
      cursor: pointer;
    }

    .masonry-item img {
      width: 100%;
      display: block;
      transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .masonry-item:hover img {
      transform: scale(1.04);
    }

    .masonry-item .overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.35s;
    }

    .masonry-item:hover .overlay {
      background: rgba(0,0,0,0.28);
    }

    .overlay-icon {
      width: 36px;
      height: 36px;
      border: 1px solid rgba(255,255,255,0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0.8);
      transition: opacity 0.3s, transform 0.3s;
    }

    .overlay-icon svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.5;
    }

    .masonry-item:hover .overlay-icon {
      opacity: 1;
      transform: scale(1);
    }

    /* ── Lightbox ── */
    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.96);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .lightbox.active {
      opacity: 1;
      visibility: visible;
    }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 88vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox-img {
      max-width: 88vw;
      max-height: 84vh;
      object-fit: contain;
      display: block;
      opacity: 0;
      transform: scale(0.96);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .lightbox-img.loaded {
      opacity: 1;
      transform: scale(1);
    }

    /* Close */
    .lb-close {
      position: fixed;
      top: 1.6rem;
      right: 2rem;
      background: none;
      border: 1px solid rgba(255,255,255,0.5);
      color: #fff;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.2rem;
      line-height: 1;
      transition: background 0.2s, border-color 0.2s;
      z-index: 1001;
    }

    .lb-close:hover {
      background: rgba(255,255,255,0.1);
      border-color: #fff;
    }

    /* Arrows */
    .lb-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: 1px solid rgba(255,255,255,0.4);
      color: #fff;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
      z-index: 1001;
    }

    .lb-arrow:hover {
      background: rgba(255,255,255,0.1);
      border-color: #fff;
    }

    .lb-arrow svg {
      width: 16px;
      height: 16px;
      fill: none;
      stroke: #fff;
      stroke-width: 1.5;
    }

    .lb-prev { left: 1.5rem; }
    .lb-next { right: 1.5rem; }

    /* Counter */
    .lb-counter {
      position: fixed;
      bottom: 1.8rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      opacity: 0.45;
    }

    /* ── Footer ── */
    footer {
      border-top: 1px solid rgba(255,255,255,0.1);
      padding: 2.2rem 3rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    footer p {
      font-size: 0.72rem;
      letter-spacing: 0.1em;
      opacity: 0.35;
    }

    .footer-links {
      display: flex;
      gap: 1.8rem;
    }

    .footer-links a {
      color: #fff;
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      opacity: 0.35;
      transition: opacity 0.2s;
    }

    .footer-links a:hover { opacity: 1; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .masonry { columns: 2; }
      .lb-prev { left: 0.6rem; }
      .lb-next { right: 0.6rem; }
    }

    @media (max-width: 768px) {
      nav { padding: 1.2rem 1.5rem; }

      .nav-links {
        position: fixed;
        inset: 0;
        background: #000;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2.8rem;
        z-index: 201;
        display: none;
      }

      .nav-links.open { display: flex; }
      .nav-links a { font-size: 1rem; letter-spacing: 0.2em; opacity: 0.8; }

      .hamburger { display: flex; }

      footer {
        flex-direction: column;
        text-align: center;
        padding: 2rem 1.5rem;
      }

      .lb-arrow {
        width: 38px;
        height: 38px;
      }
    }

    @media (max-width: 480px) {
      .masonry { columns: 1; }
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .page-header .eyebrow { animation: fadeUp 0.9s ease-out 0.1s both; }
    .page-header h1       { animation: fadeUp 1.1s cubic-bezier(0.22, 1, 0.36, 1) 0.25s both; }
    .page-header .sub     { animation: fadeUp 0.9s ease-out 0.45s both; }
    .page-header .rule    { animation: fadeUp 0.8s ease-out 0.6s both; }
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.75s ease, transform 0.75s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── Scroll-to-top ── */
    .scroll-top {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: #fff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.3s ease, visibility 0.3s ease, background 0.25s ease, transform 0.25s ease;
      z-index: 500;
    }
    .scroll-top.visible { opacity: 1; visibility: visible; }
    .scroll-top:hover { background: rgba(255,255,255,0.85); transform: translateY(-3px); }
    .scroll-top svg { width: 14px; height: 14px; fill: none; stroke: #000; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav>
    <a href="index.html" class="nav-logo">Karina</a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html"   onclick="closeNav()">Home</a></li>
      <li><a href="gallery.html" class="active" onclick="closeNav()">Gallery</a></li>
      <li><a href="about.html"   onclick="closeNav()">About</a></li>
      <li><a href="contact.html" onclick="closeNav()">Contact</a></li>
    </ul>
    <button class="hamburger" id="hamburger" aria-label="Toggle navigation" onclick="toggleNav()">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <!-- Page Header -->
  <header class="page-header">
    <p class="eyebrow">Wedding Photography</p>
    <h1>Gallery</h1>
    <p class="sub">Stories told in light &amp; shadow</p>
    <div class="rule"></div>
  </header>

  <!-- Masonry Grid -->
  <section class="masonry-section">
    <div class="masonry" id="masonryGrid">

      <div class="masonry-item reveal" data-index="0">
        <img src="https://picsum.photos/seed/kg01/600/900" alt="Wedding photo 1" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="1" style="transition-delay:0.1s">
        <img src="https://picsum.photos/seed/kg02/600/750" alt="Wedding photo 2" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="2" style="transition-delay:0.2s">
        <img src="https://picsum.photos/seed/kg03/600/820" alt="Wedding photo 3" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="3">
        <img src="https://picsum.photos/seed/kg04/600/680" alt="Wedding photo 4" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="4" style="transition-delay:0.1s">
        <img src="https://picsum.photos/seed/kg05/600/960" alt="Wedding photo 5" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="5" style="transition-delay:0.2s">
        <img src="https://picsum.photos/seed/kg06/600/780" alt="Wedding photo 6" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="6">
        <img src="https://picsum.photos/seed/kg07/600/840" alt="Wedding photo 7" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="7" style="transition-delay:0.1s">
        <img src="https://picsum.photos/seed/kg08/600/700" alt="Wedding photo 8" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="8" style="transition-delay:0.2s">
        <img src="https://picsum.photos/seed/kg09/600/920" alt="Wedding photo 9" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="9">
        <img src="https://picsum.photos/seed/kg10/600/760" alt="Wedding photo 10" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="10" style="transition-delay:0.1s">
        <img src="https://picsum.photos/seed/kg11/600/880" alt="Wedding photo 11" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

      <div class="masonry-item reveal" data-index="11" style="transition-delay:0.2s">
        <img src="https://picsum.photos/seed/kg12/600/740" alt="Wedding photo 12" loading="lazy" />
        <div class="overlay"><div class="overlay-icon"><svg viewBox="0 0 24 24"><path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/></svg></div></div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Karina. All rights reserved.</p>
    <div class="footer-links">
      <a href="#">Instagram</a>
      <a href="#">Email</a>
      <a href="#">Enquire</a>
    </div>
  </footer>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Image lightbox">
    <button class="lb-close" id="lbClose" aria-label="Close">&times;</button>
    <button class="lb-arrow lb-prev" id="lbPrev" aria-label="Previous">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <div class="lightbox-inner">
      <div class="lightbox-img-wrap">
        <img class="lightbox-img" id="lbImg" src="" alt="Enlarged wedding photo" />
      </div>
    </div>
    <button class="lb-arrow lb-next" id="lbNext" aria-label="Next">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="lb-counter" id="lbCounter"></div>
  </div>

  <button class="scroll-top" id="scrollTop" aria-label="Scroll to top">
    <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <script>
    /* ── Nav ── */
    const hamburger = document.getElementById('hamburger');
    const navLinks   = document.getElementById('navLinks');

    function toggleNav() {
      const open = navLinks.classList.toggle('open');
      hamburger.classList.toggle('open', open);
      document.body.style.overflow = open ? 'hidden' : '';
    }

    function closeNav() {
      navLinks.classList.remove('open');
      hamburger.classList.remove('open');
      document.body.style.overflow = '';
    }

    window.addEventListener('resize', () => {
      if (window.innerWidth > 768) closeNav();
    });

    /* Scroll reveal */
    const revealObs = new IntersectionObserver((entries) => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }
      });
    }, { threshold: 0.08 });
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));

    /* ── Lightbox ── */
    const items    = Array.from(document.querySelectorAll('.masonry-item'));
    const lightbox = document.getElementById('lightbox');
    const lbImg    = document.getElementById('lbImg');
    const lbCounter = document.getElementById('lbCounter');
    let current = 0;

    function getSrc(index) {
      return items[index].querySelector('img').src;
    }

    function showImage(index) {
      current = (index + items.length) % items.length;
      lbImg.classList.remove('loaded');
      lbImg.src = '';

      const newSrc = getSrc(current);
      const tmp = new Image();
      tmp.onload = () => {
        lbImg.src = newSrc;
        requestAnimationFrame(() => lbImg.classList.add('loaded'));
      };
      tmp.src = newSrc;

      lbCounter.textContent = (current + 1) + ' / ' + items.length;
    }

    function openLightbox(index) {
      document.body.style.overflow = 'hidden';
      lightbox.classList.add('active');
      showImage(index);
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
      setTimeout(() => { lbImg.src = ''; lbImg.classList.remove('loaded'); }, 350);
    }

    items.forEach((item, i) => {
      item.addEventListener('click', () => openLightbox(i));
    });

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', () => showImage(current - 1));
    document.getElementById('lbNext').addEventListener('click', () => showImage(current + 1));

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    /* Keyboard navigation */
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape')      closeLightbox();
      if (e.key === 'ArrowLeft')   showImage(current - 1);
      if (e.key === 'ArrowRight')  showImage(current + 1);
    });

    /* Touch swipe */
    let touchStartX = 0;
    lightbox.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    lightbox.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      if (Math.abs(dx) < 40) return;
      showImage(dx < 0 ? current + 1 : current - 1);
    }, { passive: true });

    /* Scroll-to-top */
    const scrollTopBtn = document.getElementById('scrollTop');
    window.addEventListener('scroll', () => {
      scrollTopBtn.classList.toggle('visible', window.scrollY > 400);
    }, { passive: true });
    scrollTopBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
  </script>
</body>
